<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMAR P - Global Search & Earn</title>
    <style>
        body { background-color: #000; color: #ffd700; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .logo { font-size: 50px; font-weight: bold; margin-top: 20px; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        #balance-box { background:#222; padding:8px 20px; border-radius:20px; display:inline-block; margin: 15px; border: 1px solid #ffd700; font-weight: bold; transition: 0.5s; }
        .search-bar { width: 85%; padding: 15px; border-radius: 30px; border: 2px solid #ffd700; background: #111; color: #fff; font-size: 18px; margin: 20px 0; outline: none; }
        .btn { padding: 12px 25px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; margin: 5px; font-size: 16px; transition: 0.3s; }
        .btn-search { background: #ffd700; color: #000; }
        .btn-earn { background: #28a745; color: #fff; box-shadow: 0 0 10px #28a745; }
        .btn:hover { transform: scale(1.05); opacity: 0.9; }
        
        /* تصميم لوحة البورصة والعداد */
        .dashboard { background: #121212; border: 2px solid #ffd700; border-radius: 20px; padding: 20px; margin-top: 30px; box-shadow: 0 0 20px rgba(255, 215, 0, 0.1); }
        marquee { font-size: 22px; font-weight: bold; color: #00ff00; }
        .counter { background: #000; padding: 12px; border: 1px dashed #ffd700; border-radius: 12px; display: inline-block; margin-top: 15px; }
        
        /* نظام الإعلان الوهمي */
        #ad-box { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; color: #000; padding: 20px; border-radius: 15px; z-index: 1000; width: 80%; max-width: 300px; box-shadow: 0 0 50px rgba(255,215,0,0.5); }
    </style>
</head>
<body onload="showAlert()">

    <div id="ad-box">
        <h3 style="margin-top:0; color:#28a745;">🎉 تهانينا!</h3>
        <p>لقد تأهلت للحصول على مكافأة الزوار من OMAR P.</p>
        <button onclick="closeAd()" style="background:#000; color:#fff; padding:10px; border:none; border-radius:5px; width:100%; cursor:pointer;">إغلاق والبدء بالربح</button>
    </div>

    <div class="logo">
        <span style="color:#4285F4">O</span><span style="color:#EA4335">M</span><span style="color:#FBBC05">A</span><span style="color:#34A853">R</span> <span style="color:#fff">P</span>
    </div>

    <div id="balance-box">💰 الرصيد الحالي: <span id="balance">0.25</span>$</div>

    <form action="https://www.google.com/search" method="GET">
        <input type="text" name="q" class="search-bar" placeholder="ابحث واربح الآن...">
        <br>
        <button type="submit" class="btn btn-search">بحث عمر</button>
        <button type="button" class="btn btn-earn" onclick="addDollar()">تأكيد الربح الآمن (+1$)</button>
    </form>

    <div class="dashboard">
        <p style="letter-spacing: 2px;">📊 GLOBAL MARKETS LIVE</p>
        <marquee scrollamount="6">
            GOLD: $2,180 ▲ &nbsp;&nbsp;&nbsp; BTC: $69,450 ▲ &nbsp;&nbsp;&nbsp; OIL: $82.15 ▼ &nbsp;&nbsp;&nbsp; OMAR TOKEN: $1.25 ▲
        </marquee>
        
        <div class="counter">
            <p style="margin:0 0 5px 0; font-size:12px; color:#aaa;">GLOBAL VISITORS</p>
            <img src="https://hitwebcounter.com/counter/counter.php?page=9432851&style=0025&nbdigits=5&type=page&initCount=184" title="Free Counter" Alt="web counter" border="0" />
        </div>
    </div>

    <script>
        function showAlert() {
            setTimeout(() => { document.getElementById('ad-box').style.display = 'block'; }, 1000);
        }
        function closeAd() {
            document.getElementById('ad-box').style.display = 'none';
        }
        function addDollar() {
            let bal = document.getElementById('balance');
            let current = parseFloat(bal.innerText);
            bal.innerText = (current + 1.00).toFixed(2);
            document.getElementById('balance-box').style.background = '#ffd700';
            document.getElementById('balance-box').style.color = '#000';
            alert("تمت إضافة 1 دولار إلى رصيدك بنجاح! استمر في البحث.");
            setTimeout(() => {
                document.getElementById('balance-box').style.background = '#222';
                document.getElementById('balance-box').style.color = '#ffd700';
            }, 1000);
        }
    </script>

</body>
</html>
