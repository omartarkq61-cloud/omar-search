DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>OMAR SAFE SEARCH | نظام عمر المشفر</title>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        /* خلفية مصفوفة الأمان (Matrix) */
        canvas { display: block; }
        .secure-layer { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 500px; background: rgba(0, 20, 0, 0.9); border: 2px solid #00ff00; border-radius: 20px; padding: 40px; text-align: center; box-shadow: 0 0 30px #00ff00; color: #00ff00; z-index: 10; }
        .logo-secure { font-size: 40px; font-weight: bold; text-shadow: 0 0 10px #00ff00; margin-bottom: 20px; }
        .input-box { width: 100%; padding: 15px; background: #000; border: 1px solid #00ff00; color: #00ff00; border-radius: 10px; font-size: 18px; outline: none; margin-bottom: 20px; }
        .btn-secure { background: #00ff00; color: #000; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-secure:hover { background: #003300; color: #00ff00; box-shadow: 0 0 20px #00ff00; }
        .status { font-size: 12px; margin-top: 15px; color: #00ff00; opacity: 0.7; }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="secure-layer">
    <div class="logo-secure">OMAR ENCRYPTED</div>
    <p>نظام البحث المحصن للمبرمج عمر</p>
    
    <form action="https://www.google.com/search" method="GET" target="_blank">
        <input type="text" name="q" class="input-box" placeholder="اكتب شفرة البحث هنا..." required autocomplete="off">
        <button type="submit" class="btn-secure">إطلاق البحث الآمن</button>
    </form>
    
    <div class="status">الحماية: نشطة (SSL 256-bit) | المبرمج: عـمـر</div>
</div>

<script>
    // كود مصفوفة الأمان الخلفية
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const chars = "01010101OMARSEARCHSECURE0101";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = [];
    for (let x = 0; x < columns; x++) drops[x] = 1;

    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0f0";
        ctx.font = fontSize + "px arial";
        for (let i = 0; i < drops.length; i++) {
            const text = chars.charAt(Math.floor(Math.random() * chars.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(draw, 35);
</script>

</body>
</html>
