<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMAR P - Global Search</title>
    <style>
        body { background-color: #000; color: #ffd700; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .logo { font-size: 50px; font-weight: bold; margin-top: 20px; }
        .search-bar { width: 80%; padding: 15px; border-radius: 25px; border: 2px solid #ffd700; background: #111; color: #fff; font-size: 18px; margin: 20px 0; }
        .btn { padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; margin: 5px; }
        .btn-search { background: #ffd700; color: #000; }
        .btn-earn { background: #28a745; color: #fff; }
        .dashboard { background: #121212; border: 2px solid #ffd700; border-radius: 15px; padding: 15px; margin-top: 30px; }
        marquee { font-size: 20px; font-weight: bold; color: #00ff00; }
        .counter { background: #000; padding: 10px; border: 1px dashed #ffd700; border-radius: 10px; display: inline-block; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="logo">
        <span style="color:#4285F4">O</span><span style="color:#EA4335">M</span><span style="color:#FBBC05">A</span><span style="color:#34A853">R</span> <span style="color:#fff">P</span>
    </div>

    <div style="background:#222; padding:5px 15px; border-radius:20px; display:inline-block; margin: 10px;">
        💰 الرصيد: 0.25$
    </div>

    <form action="https://www.google.com/search" method="GET">
        <input type="text" name="q" class="search-bar" placeholder="ابحث في برش...">
        <br>
        <button type="submit" class="btn btn-search">بحث عمر</button>
        <button type="button" class="btn btn-earn">تأكيد الربح الآمن</button>
    </form>

    <div class="dashboard">
        <p>📊 GLOBAL MARKETS LIVE | البورصة العالمية</p>
        <marquee>
            GOLD: $2,180 ▲ &nbsp;&nbsp;&nbsp; BTC: $69,120 ▲ &nbsp;&nbsp;&nbsp; OIL: $82.15 ▼ &nbsp;&nbsp;&nbsp; OMAR P TOKEN: $1.05 ▲
        </marquee>
        
        <div class="counter">
            <p style="margin:0; font-size:12px; color:#aaa;">GLOBAL VISITORS</p>
            <img src="https://hitwebcounter.com/counter/counter.php?page=9432851&style=0025&nbdigits=5&type=page&initCount=100" title="Free Counter" Alt="web counter" border="0" />
        </div>
    </div>

</body>
</html>
