<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>OMAR SECURE SYSTEM | نظام عمر المحصن</title>
    <style>
        /* الخلفية بيضاء وبسيطة */
        body { margin: 0; padding: 0; background: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* حاوية الموقع في المنتصف */
        .secure-layer { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 500px; background: #fff; border: 3px solid #000; border-radius: 25px; padding: 30px; text-align: center; box-shadow: 0 0 30px rgba(0, 0, 0, 0.1); color: #000; }
        
        /* شعار عمر بالأسود */
        .logo-secure { font-size: 32px; font-weight: bold; margin-bottom: 20px; color: #000; letter-spacing: 1px; }
        
        /* مربع البحث بوضوح تام */
        .input-box { width: 90%; padding: 18px; background: #f5f5f5; border: 2px solid #ccc; color: #000; border-radius: 12px; font-size: 19px; margin-bottom: 25px; text-align: center; outline: none; }
        .input-box:focus { border-color: #0f0; background: #fff; }
        
        /* زر البحث الأخضر */
        .btn-secure { background: #0f0; color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; font-size: 19px; }
        .btn-secure:hover { background: #0c0; color: #fff; box-shadow: 0 0 15px rgba(0, 255, 0, 0.5); }
        
        /* عداد الأرباح الذهبي (الأصلي) */
        #bank-account { color: #ffd700; background: rgba(0, 0, 0, 0.8); border: 2px solid #ffd700; padding: 12px; border-radius: 15px; margin: 15px auto; font-weight: bold; font-size: 18px; }
        
        /* معلومات الأسفل */
        .footer-info { margin-top: 25px; font-size: 12px; color: #666; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="secure-layer">
        <div class="logo-secure">OMAR ENCRYPTED</div>
        <p style="color: #333;">محرك البحث العالمي المشفّر</p>

        <div id="bank-account">
            💰 الرصيد الحالي: $<span id="balance-amount">0.00</span>
        </div>

        <form action="https://www.google.com/search" method="GET" target="_blank" id="search-form">
            <input type="text" name="q" class="input-box" placeholder="أدخل شفرة البحث هنا..." required>
            <button type="submit" class="btn-secure">تأكيد البحث الآمن</button>
        </form>

        <div class="footer-info">
            نظام حماية عمر الفائق (v2.1) | حقوق المبرمج محفوظة
        </div>
    </div>

    <script>
        // نظام زيادة الأرباح عند البحث
        document.getElementById('search-form').onsubmit = function() {
            let balanceElement = document.getElementById('balance-amount');
            let currentBalance = parseFloat(balanceElement.innerText);
            currentBalance += 0.05; // سيزيد الرصيد مع كل بحث
            balanceElement.innerText = currentBalance.toFixed(2);
        };
    </script>
</body>
</html>
