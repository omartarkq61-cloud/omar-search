<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Omar Search</title>
<style>
body {
    text-align: center;
    font-family: Arial;
    margin-top: 150px;
    background-color: #f2f2f2;
}
h1 {
    font-size: 50px;
}
input {
    width: 500px;
    padding: 12px;
    border-radius: 20px;
    border: 1px solid #ccc;
}
button {
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    background-color: #4285F4;
    color: white;
}
</style>
</head>
<body>

<h1>🔍 Omar Search</h1>

<form action="https://www.google.com/search">
    <input type="text" name="q" placeholder="ابحث في الانترنت...">
    <br><br>
    <button type="submit">بحث</button>
</form>

</body>
</html
